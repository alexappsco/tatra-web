<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>رمز التحقق</title>

  <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css" />

  <style>
    :root {
      --main: #391462;
      dialog::backdrop { background: rgba(0, 0, 0, 0.7); }
    .chip-active { background-color: #38135C !important; color: white !important; border-color: #38135C !important; }
    #favModal {
  margin: auto;
}
    }
    
  </style>
</head>

<body class="h-screen overflow-hidden font-[Almarai]">

<div class="flex flex-col lg:flex-row h-screen">

  <!-- IMAGE -->
  <div class="w-full lg:w-1/2 relative hidden lg:block">
    <img src="./imgs/main.jpg" class="w-full h-full object-cover" />
    <div class="absolute inset-0 bg-black/60"></div>

    <div class="absolute inset-0 flex items-center justify-center text-center text-white px-10">
      <div>
        <h2 class="text-2xl font-bold mb-3">ابدأ رحلتك في عالم المعرفة الآن</h2>
        <p class="text-base opacity-90">انضم إلى آلاف القراء في الوطن العربي</p>
      </div>
    </div>
  </div>

  <!-- FORM WRAPPER -->
<div class="w-full lg:w-1/2 min-h-screen flex items-center justify-center bg-[#fffaf6] px-20">

  <div class="w-full max-w-md text-center">
<div class="text-right w-full">

  <h1 class="text-3xl font-bold text-[var(--main)] mb-2">
    رمز الدخول
  </h1>

  <p class="text-sm text-[var(--main)] mb-8 font-bold">
    أهلاً بك مجددًا، أدخل بياناتك للمتابعة
  </p>

</div>
    <!-- TITLE -->
   

    <!-- OTP -->
    <div class="flex justify-center gap-5 my-14" >
      <input maxlength="1"
        class="w-14 h-14 text-center text-xl border border-gray-200 rounded-xl focus:ring-2 focus:ring-[var(--main)] outline-none" />

      <input maxlength="1"
        class="w-14 h-14 text-center text-xl border border-gray-200 rounded-xl focus:ring-2 focus:ring-[var(--main)] outline-none" />

      <input maxlength="1"
        class="w-14 h-14 text-center text-xl border border-gray-200 rounded-xl focus:ring-2 focus:ring-[var(--main)] outline-none" />

      <input maxlength="1"
        class="w-14 h-14 text-center text-xl border border-gray-200 rounded-xl focus:ring-2 focus:ring-[var(--main)] outline-none" />
    </div>

    <!-- BUTTON -->
    <button id="openDialogBtn" class="w-full bg-[var(--main)] text-white py-3 rounded-full font-bold hover:opacity-90 transition">
      دخول
    </button>

    <!-- TEXT -->
    <p class="text-center text-sm text-[var(--main)] my-8">
      أو الدخول عبر
    </p>

    <!-- GOOGLE -->
    <div class="flex justify-center mt-3">
      <button class="border border-gray-200 py-2 px-20 rounded-full text-[var(--main)] bg-white hover:bg-gray-100 transition">
        Google
      </button>
    </div>

    <!-- SIGNUP -->
    <p class="text-xs text-orange-500 mt-5">
      <span class="text-[var(--main)] font-bold">ليس لديك حساب؟</span>
      إنشاء حساب جديد
    </p>

  </div>
</div>

</div>
<dialog id="favModal" class="p-8 rounded-3xl shadow-xl w-[90%] max-w-2xl bg-white backdrop:backdrop-blur-sm">
  <div class="text-center">
    <h2 class="text-xl font-bold text-gray-800 mb-6">اختار انواع الكتب المفضلة اليك لكي تستمتع بالقراءة</h2>
    
    <div class="flex flex-wrap justify-center gap-3 mb-6">
        <button onclick="toggleChip(this)" class="chip border border-gray-300 rounded-full px-4 py-2 text-sm flex items-center gap-2 transition">
            <svg class="icon w-4 h-4" viewBox="0 0 24 24" fill="none"><path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg> <span>اقل من 100</span>
        </button>
        <button onclick="toggleChip(this)" class="chip border border-gray-300 rounded-full px-4 py-2 text-sm flex items-center gap-2 transition">
            <svg class="icon w-4 h-4" viewBox="0 0 24 24" fill="none"><path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg> <span>رومانسية</span>
        </button>
        <button onclick="toggleChip(this)" class="chip border border-gray-300 rounded-full px-4 py-2 text-sm flex items-center gap-2 transition">
            <svg class="icon w-4 h-4" viewBox="0 0 24 24" fill="none"><path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg> <span>اسلاميه</span>
        </button>
        <button onclick="toggleChip(this)" class="chip border border-gray-300 rounded-full px-4 py-2 text-sm flex items-center gap-2 transition">
           <svg class="icon w-4 h-4" viewBox="0 0 24 24" fill="none"><path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg> <span>رعب</span>
        </button>
        <button onclick="toggleChip(this)" class="chip border border-gray-300 rounded-full px-4 py-2 text-sm flex items-center gap-2 transition">
            <svg class="icon w-4 h-4" viewBox="0 0 24 24" fill="none"><path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg> <span>تشويق</span>
        </button>
        <button onclick="toggleChip(this)" class="chip border border-gray-300 rounded-full px-4 py-2 text-sm flex items-center gap-2 transition">
           <svg class="icon w-4 h-4" viewBox="0 0 24 24" fill="none"><path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg> <span>ادب</span>
        </button>
        <button onclick="toggleChip(this)" class="chip border border-gray-300 rounded-full px-4 py-2 text-sm flex items-center gap-2 transition">
            <svg class="icon w-4 h-4" viewBox="0 0 24 24" fill="none"><path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg> <span>روايات حدثت بالفعل</span>
        </button>
        <button onclick="toggleChip(this)" class="chip border border-gray-300 rounded-full px-4 py-2 text-sm flex items-center gap-2 transition">
            <svg class="icon w-4 h-4" viewBox="0 0 24 24" fill="none"><path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg> <span>سيكولوجي</span>
        </button>
        <button onclick="toggleChip(this)" class="chip border border-gray-300 rounded-full px-4 py-2 text-sm flex items-center gap-2 transition">
            <svg class="icon w-4 h-4" viewBox="0 0 24 24" fill="none"><path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg> <span>علوم</span>
        </button>
        <button onclick="toggleChip(this)" class="chip border border-gray-300 rounded-full px-4 py-2 text-sm flex items-center gap-2 transition">
            <svg class="icon w-4 h-4" viewBox="0 0 24 24" fill="none"><path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg> <span>تاريخ</span>
        </button>
        <button onclick="toggleChip(this)" class="chip border border-gray-300 rounded-full px-4 py-2 text-sm flex items-center gap-2 transition">
            <svg class="icon w-4 h-4" viewBox="0 0 24 24" fill="none"><path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg> <span>دراما</span>
        </button>
        <button onclick="toggleChip(this)" class="chip border border-gray-300 rounded-full px-4 py-2 text-sm flex items-center gap-2 transition">
           <svg class="icon w-4 h-4" viewBox="0 0 24 24" fill="none"><path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><span>كيمياء</span>
        </button>
        <button onclick="toggleChip(this)" class="chip border border-gray-300 rounded-full px-4 py-2 text-sm flex items-center gap-2 transition">
            <svg class="icon w-4 h-4" viewBox="0 0 24 24" fill="none"><path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg> <span>علوم الارض</span>
        </button>
    </div>

    <button class="text-[var(--main)] font-bold mb-6 block w-full">اعرض المزيد</button>
    <button onclick="window.location.href='sign-in.html'" class="w-full bg-[var(--main)] text-white py-3 rounded-full font-bold hover:opacity-90 transition">متابعه</button>
    <p class="text-gray-400 text-xs mt-3">اختار 3 اقسام او اكثر للمتابعه</p>
  </div>
</dialog>

<script>
  const modal = document.getElementById('favModal');
  document.getElementById('openDialogBtn').addEventListener('click', () => modal.showModal());

  function toggleChip(btn) {
    const svg = btn.querySelector('.icon');
    if (btn.classList.contains('chip-active')) {
      btn.classList.remove('chip-active');
      svg.innerHTML = '<path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>';
    } else {
      btn.classList.add('chip-active');
      svg.innerHTML = '<path d="M5 12L10 17L20 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
    }
  }
</script>
</body>
</html>
