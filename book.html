<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>اطلب كتابك الآن</title>
  <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css" />

  <style>
    body {
      font-family: 'Almarai', sans-serif;
    }

    :root {
      --main: #391462;
    }

    .main-btn {
      background: var(--main);
    }

    .main-btn:hover {
      background: #2c0f4d;
    }
  </style>
</head>

<body class="bg-[#f8f8f8]">
<div class="bg-gray-50 border-b border-gray-100 py-2 text-xs text-gray-500">
  <div class="container mx-auto px-4 flex flex-col lg:flex-row lg:justify-between gap-2 lg:gap-0">

    <!-- left -->
    <div class="flex flex-wrap gap-4 items-center justify-center lg:justify-start">
      <span class="flex items-center gap-1">
        <img src="imgs/phone.svg" class="h-4 w-auto" />
        +966556754472
      </span>

      <span class="flex items-center gap-1">
        <img src="imgs/mail.svg" class="h-4 w-auto" />
        Support@ttra.sa
      </span>
    </div>

    <!-- right -->
    <div class="flex flex-wrap gap-3 items-center justify-center lg:justify-end">

      <span class="flex items-center gap-1">
        <img src="imgs/arab.svg" class="h-4 w-auto" />
        العربية - ر.س
      </span>

      <img src="imgs/line.svg" class="h-4 w-auto hidden lg:block" />

      <span>المفضلة</span>

      <img src="imgs/line.svg" class="h-4 w-auto hidden lg:block" />

      <span>سياسة الاستبدال أو الاسترجاع</span>

      <img src="imgs/line.svg" class="h-4 w-auto hidden lg:block" />

      <span>مكتبتي</span>

    </div>

  </div>
</div>

<header class="bg-white shadow-sm p-4">
  <div class="container mx-auto flex flex-wrap items-center justify-between gap-4">

    <!-- Logo -->
    <img src="./imgs/logo.png" class="w-28 md:w-32 h-auto object-contain" />

    <!-- Search -->
    <div class="w-full md:flex-1 md:max-w-lg order-3 md:order-none">
      <div class="relative">
        <input
          class="w-full bg-gray-50 border border-gray-200 rounded-lg py-2.5 px-4 text-right"
          placeholder="ابحث عما تريد"
        />
        <span class="absolute left-3 top-4 text-gray-400"><img src="imgs/serach.svg" class="h-4 w-4 " /></span>
      </div>
    </div>

    <!-- Actions -->
    <div class="flex items-center gap-4 md:gap-6">

      <!-- login -->
      <div class="flex items-center gap-2">
        <span class="text-xl md:text-2xl text-gray-400"><img src="imgs/account.svg" class="h-6 w-6" /></span>
        <div class="text-sm text-right hidden sm:block">
          <p class="text-xs text-gray-400">مرحباً بك</p>
          <p class="font-bold text-[var(--main)]">تسجيل دخول</p>
        </div>
      </div>

      <!-- cart -->
      <div class="flex items-center gap-2">
        <div class="relative">
          <span class="text-xl md:text-2xl"><img src="imgs/cart.svg" class="h-6 w-6" /></span>
          <span class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] rounded-full w-4 h-4 flex items-center justify-center">
            2
          </span>
        </div>

        <div class="text-sm text-right hidden sm:block">
          <p class="text-xs text-gray-400">سلة المشتريات</p>
          <p class="font-bold text-[var(--main)]">1,200 ر.س</p>
        </div>
      </div>

    </div>

  </div>
</header>
<div class="w-full bg-[#391462] py-3">
  <div class="max-w-7xl mx-auto px-4 md:px-10 lg:px-16 flex gap-6 text-white text-sm font-medium justify-start">
    <a href="#" class="hover:underline">مترجمات ▾</a>
    <a href="#" class="hover:underline">اداره اعمال ▾</a>
    <a href="#" class="hover:underline">رعب ▾</a>
    <a href="#" class="hover:underline">سياسه ▾</a>
    <a href="#" class="hover:underline">رومانسيه ▾</a>
  </div>
</div>
<header
  class="h-12 bg-white border border-gray-200 rounded-md px-6 flex items-center justify-start container mx-auto p-6 my-4 "
>
  <div class="flex items-center gap-4 text-sm text-gray-500">
 <div
      class="relative w-8 h-8 flex items-center justify-center bg-white"
    >
   
    <img src="./imgs/home.svg" class="w-4 h-4 " alt="قلب" />
     <img src="./imgs/row.svg" class=" " alt="قلب" />
    </div>
    <span class="font-medium text-gray-600">
      كتاب ورقي
    </span>

   

  </div>
</header>
  <section class="min-h-screen p-4 md:p-6 lg:p-8">
    <div class="max-w-7xl mx-auto">

      <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 lg:gap-12 items-center">

        <!-- الفورم -->
        <div class="flex items-center justify-center order-2 lg:order-1">

          <form class="w-full max-w-xl space-y-6">

            <!-- اسم المستخدم -->
            <div>
              <label class="block text-sm font-bold text-gray-700 mb-2">
                اسم المستخدم
              </label>

              <input
                type="text"
                placeholder="مبارك سالم آل سلمان"
                class="w-full h-14 px-4 rounded-md bg-[#FAFAFA] border border-gray-200 focus:border-purple-700 focus:ring-2 focus:ring-purple-200 outline-none transition"
              >
            </div>

            <!-- البريد الإلكتروني -->
            <div>
              <label class="block text-sm font-bold text-gray-700 mb-2">
                البريد الإلكتروني
              </label>

              <input
                type="email"
                placeholder="mubarksalem@gmail.com"
                class="w-full h-14 px-4 rounded-md bg-[#FAFAFA] border border-gray-200 focus:border-purple-700 focus:ring-2 focus:ring-purple-200 outline-none transition"
              >
            </div>

            <!-- رقم الجوال -->
        <div>
  <label class="block text-sm font-bold text-gray-700 mb-2">
    رقم الجوال
  </label>

  <div
    class="group flex items-center overflow-hidden rounded-md border border-gray-200 bg-[#FAFAFA]
           transition-all duration-200
           hover:border-purple-700
           focus-within:border-purple-700
           focus-within:ring-2 focus-within:ring-purple-200"
  >

    <input
    dir="rtl" 
      type="tel"
      placeholder="0512345451"
      class="flex-1 h-14 px-4 bg-transparent border-0 outline-none focus:ring-0"
    >

    <div
      class="flex h-14 min-w-[110px] items-center justify-center gap-2
             border-r border-gray-200 px-3
             transition-colors duration-200
             group-hover:border-purple-700
             group-focus-within:border-purple-700"
    >
      <img src="imgs/sauid.svg" alt="SA" class="h-5 w-5 object-contain" />
      <span class="text-sm font-semibold text-gray-700">+966</span>
    </div>

  </div>
</div>

            <!-- المدينة -->
            <div>
              <label class="block text-sm font-bold text-gray-700 mb-2">
                العنوان
              </label>

              <div class="relative">

                <select
                  class="w-full h-14 px-4 rounded-md bg-[#FAFAFA] border border-gray-200 appearance-none focus:border-purple-700 focus:ring-2 focus:ring-purple-200 outline-none transition"
                >
                  <option selected>الرياض</option>
                  <option>جدة</option>
                  <option>الدمام</option>
                  <option>مكة المكرمة</option>
                </select>

                <svg
                  class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500 pointer-events-none"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M19 9l-7 7-7-7"
                  />
                </svg>

              </div>
            </div>

            <!-- الحي -->
            <div>
              <label class="block text-sm font-bold text-gray-700 mb-2">
               اسم الكتاب
              </label>

              <input
                type="text"
                placeholder="القتل للمبتدئين"
                class="w-full h-14 px-4 rounded-md bg-[#FAFAFA] border border-gray-200 focus:border-purple-700 focus:ring-2 focus:ring-purple-200 outline-none transition"
              >
            </div>

            <!-- الزر -->
            <div class="pt-8 text-center">
              <button
                style="cursor: pointer;"
                class="mx-auto block w-full max-w-xs h-10 rounded-md text-white font-bold text-base bg-[#391462] hover:bg-[#2d104d] transition"
              >
                اطلب كتابك الآن
              </button>
            </div>

          </form>

        </div>

        <!-- الصورة -->
        <div class="order-1 lg:order-2">
          <img
            src="imgs/book.jpg"
            alt="كتاب"
            class="w-full h-[450px] md:h-[600px] lg:h-[760px] object-cover rounded-md"
          >
        </div>

      </div>

    </div>
  </section>

</body>
</html>
