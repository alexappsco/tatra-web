<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>سلة الطلبات</title>

<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
    body{
        font-family:'Almarai',sans-serif;
        background:#f7f7f7;
    }

    :root{
        --main:#391462;
    }
</style>
</head>

<body>

<div class="max-w-7xl mx-auto p-4 lg:p-6">

    <div class="grid grid-cols-1 xl:grid-cols-[1fr_280px] gap-5">

        <!-- المنتجات -->
        <div class="space-y-4">

            <!-- المنتج -->
            <div class="bg-white border border-gray-200 rounded-md p-4">

                <div class="flex flex-col lg:flex-row items-start lg:items-center gap-4">

                    <!-- معلومات الكتاب -->
                    <div class="flex items-center gap-4 flex-1">

                        <img
                            src="imgs/book-info.png"
                            alt=""
                            class="w-20 h-20 object-cover rounded"
                        >

                        <div>
                            <h3 class="text-sm md:text-base font-semibold text-gray-800">
                                كتاب العقل للمبتدئين أحمد مراد
                            </h3>

                            <span class="text-sm text-gray-500">
                                50,000 ر.س
                            </span>
                        </div>

                    </div>

                    <!-- الكمية -->
                    <div class="w-full lg:w-auto">

                        <div class="w-full lg:w-32 h-12 border rounded-md flex items-center justify-center text-gray-600">
                            1
                        </div>

                    </div>

                    <!-- السعر -->
                    <div class="text-gray-700 font-medium min-w-[90px]">
                        50,000 ر.س
                    </div>

                    <!-- حذف -->
                    <button
                        class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-500 hover:bg-red-50 hover:text-red-500 transition"
                    >
                        ×
                    </button>

                </div>

            </div>

            <!-- المنتج -->
            <div class="bg-white border border-gray-200 rounded-md p-4">

                <div class="flex flex-col lg:flex-row items-start lg:items-center gap-4">

                    <div class="flex items-center gap-4 flex-1">

                        <img
                            src="imgs/book-info.png"
                            alt=""
                            class="w-20 h-20 object-cover rounded"
                        >

                        <div>
                            <h3 class="text-sm md:text-base font-semibold text-gray-800">
                                كتاب العقل للمبتدئين أحمد مراد
                            </h3>

                            <span class="text-sm text-gray-500">
                                50,000 ر.س
                            </span>
                        </div>

                    </div>

                    <div class="w-full lg:w-auto">
                        <div class="w-full lg:w-32 h-12 border rounded-md flex items-center justify-center">
                            2
                        </div>
                    </div>

                    <div class="text-gray-700 font-medium min-w-[90px]">
                        50,000 ر.س
                    </div>

                    <button
                        class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-500 hover:bg-red-50 hover:text-red-500 transition"
                    >
                        ×
                    </button>

                </div>

            </div>

            <!-- المنتج -->
            <div class="bg-white border border-gray-200 rounded-md p-4">

                <div class="flex flex-col lg:flex-row items-start lg:items-center gap-4">

                    <div class="flex items-center gap-4 flex-1">

                        <img
                            src="imgs/book-info.png"
                            alt=""
                            class="w-20 h-20 object-cover rounded"
                        >

                        <div>
                            <h3 class="text-sm md:text-base font-semibold text-gray-800">
                                كتاب العقل للمبتدئين أحمد مراد
                            </h3>

                            <span class="text-sm text-gray-500">
                                50,000 ر.س
                            </span>
                        </div>

                    </div>

                    <div class="w-full lg:w-auto">
                        <div class="w-full lg:w-32 h-12 border rounded-md flex items-center justify-center">
                            2
                        </div>
                    </div>

                    <div class="text-gray-700 font-medium min-w-[90px]">
                        50,000 ر.س
                    </div>

                    <button
                        class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-500 hover:bg-red-50 hover:text-red-500 transition"
                    >
                        ×
                    </button>

                </div>

            </div>

        </div>

        <!-- الملخص -->
        <aside class="bg-white border border-gray-200 rounded-md p-4 h-fit xl:sticky xl:top-6">

            <h2 class="text-lg font-bold text-gray-800 mb-6">
                ملخص الطلب
            </h2>

            <div class="flex justify-between text-gray-700 mb-4">
                <span>إجمالي المنتجات</span>
                <span>145 ر.س</span>
            </div>

            <div class="mb-5">

                <label class="block text-sm mb-2 text-gray-700">
                    هل لديك كود خصم
                </label>

                <div class="flex gap-2 items-center">
                    <input
                        type="text"
                        placeholder="أدخل كود الخصم"
                        class="flex-1 min-w-0 border rounded-md px-3 h-10 outline-none focus:border-[#391462]"
                    >
                    <button
                        class="flex-shrink-0 h-10 px-4 border border-[#391462] text-[#391462] rounded-md text-sm hover:bg-[#391462] hover:text-white transition"
                    >
                        إضافة
                    </button>
                </div>

            </div>

            <div class="border-t pt-4">

                <div class="flex justify-between items-center mb-1">
                    <span class="font-bold text-gray-800">
                        الإجمالي
                    </span>

                    <span class="font-bold text-gray-800">
                        145 ر.س
                    </span>
                </div>

                <p class="text-xs text-gray-400 mb-5">
                   الاسعار شاملة للضريبة <spna class="text-red-400">*</spna>
                </p>

                <button
                    class="w-full h-12 bg-[#391462] text-white rounded-md hover:bg-[#2c104b] transition"
                >
                    إتمام الطلب
                </button>

            </div>

        </aside>

    </div>

</div>

</html>
