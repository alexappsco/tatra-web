 <div

<!-- Account Edit -->
<section class="container mx-auto px-4 mb-10">
  <div class="border border-[#E6E6E6] rounded-lg p-5 md:p-8">

    <!-- Title -->
    <h2 class="text-xl font-bold text-[#391462] text-right mb-8">
      تعديل الحساب
    </h2>

    <div class="flex flex-col lg:flex-row-reverse gap-10 items-start">

      <!-- Form Side -->
      <div class="w-full lg:w-7/12 order-2 lg:order-2">

        <form>

          <!-- First Name -->
          <div class="mb-5">
            <label class="block text-sm text-gray-700 mb-2">
              الاسم الأول
            </label>
            <input
              type="text"
              value="مصطفى"
              class="w-full h-12 border border-[#E6E6E6] rounded-md px-4 outline-none focus:border-[#391462]"
            >
          </div>

          <!-- Last Name -->
          <div class="mb-5">
            <label class="block text-sm text-gray-700 mb-2">
              الاسم الأخير
            </label>
            <input
              type="text"
              value="الحسيني"
              class="w-full h-12 border border-[#E6E6E6] rounded-md px-4 outline-none focus:border-[#391462]"
            >
          </div>

          <!-- Email -->
          <div class="mb-5">
            <label class="block text-sm text-gray-700 mb-2">
              البريد الإلكتروني
            </label>
            <input
              type="email"
              value="dianne.russell@gmail.com"
              class="w-full h-12 border border-[#E6E6E6] rounded-md px-4 outline-none focus:border-[#391462]"
            >
          </div>

          <!-- Phone -->
          <div class="mb-5">
            <label class="block text-sm text-gray-700 mb-2">
              رقم الهاتف
            </label>
            <input
              type="tel"
              value="(971) 555-0123"
              class="w-full h-12 border border-[#E6E6E6] rounded-md px-4 outline-none focus:border-[#391462]"
            >
          </div>

        </form>
      </div>

      <!-- Image Side -->
      <div class="w-full lg:w-5/12 flex flex-col items-center order-1 lg:order-1">

        <img
          src="imgs/profile.jpg"
          alt="profile"
          class="w-44 h-44 rounded-full object-cover"
        >

        <button
          type="button"
          class="mt-5 bg-[#391462] hover:bg-[#2d0f4f] text-white px-10 h-12 rounded-xl font-bold transition"
        >
          تعديل
        </button>

      </div>

    </div>

    <!-- Save Button -->
    <div class="mt-10">
      <button
        type="submit"
        class="bg-[#391462] hover:bg-[#2d0f4f] text-white px-10 h-12 rounded-lg font-bold transition"
      >
        حفظ التغييرات
      </button>
    </div>

  </div>
